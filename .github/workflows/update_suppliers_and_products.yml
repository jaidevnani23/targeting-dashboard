name: Update Suppliers and Products

on:
  schedule:
    - cron: '0 8 2 1,4,7,10 *'   # 1st of Jan, Apr, Jul, Oct at 8 AM UTC / 1:30 PM IST
  workflow_dispatch:               # manual trigger

jobs:
  update-suppliers-and-products:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl python-dotenv beautifulsoup4 lxml

      - name: Run MSME supplier fetcher
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        run: python msme_supplier_fetcher.py

      - name: Run product discovery
        run: python product_discovery.py

      - name: Commit supplier JSONs and product suggestions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/suppliers/ data/new_products_suggestions.json || true
          git diff --staged --quiet || git commit -m "Quarterly update: suppliers + product suggestions $(date +'%Y-%m-%d')"
          git push || true
