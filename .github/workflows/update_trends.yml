name: Update Google Trends Data

on:
  schedule:
    - cron: '0 6 1 * *'  # 6 AM UTC on 1st of each month
  workflow_dispatch:     # Manual trigger button

permissions:
  contents: write
  actions: read

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 1200
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify input Excel exists
        run: |
          if [ ! -f "data/Demand_Excel_Filled.xlsx" ]; then
            echo "❌ Error: Input file not found at data/Demand_Excel_Filled.xlsx"
            ls -la data/
            exit 1
          fi
          echo "✅ Input file found: data/Demand_Excel_Filled.xlsx"
      
      - name: Run Google Trends scraper
        env:
          BRIGHTDATA_USERNAME: ${{ secrets.BRIGHTDATA_USERNAME }}
          BRIGHTDATA_PASSWORD: ${{ secrets.BRIGHTDATA_PASSWORD }}
          BRIGHTDATA_HOST: ${{ secrets.BRIGHTDATA_HOST }}
          BRIGHTDATA_PORT: ${{ secrets.BRIGHTDATA_PORT }}
        run: |
          echo "🚀 Starting Google Trends scraper..."
          python google_trends_scraper.py
          echo "✅ Scraper completed"
      
      - name: Verify outputs were created
        run: |
          echo "📊 Checking output files..."
          ls -lh data/
          
          if [ -f "data/dashboard_trends_data.json" ]; then
            echo "✅ JSON file created"
            wc -l data/dashboard_trends_data.json
          else
            echo "⚠️  JSON file not found"
          fi
          
          if [ -f "data/Demand_Excel_With_Trends.xlsx" ]; then
            echo "✅ Excel output created"
          else
            echo "⚠️  Excel output not found"
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add all generated files
          git add data/dashboard_trends_data.json || true
          git add data/Demand_Excel_With_Trends.xlsx || true
          git add data/scraping_progress.json || true
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "📝 No changes detected - nothing to commit"
          else
            echo "💾 Committing changes..."
            git commit -m "🤖 Auto-update trends data - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Changes pushed to repository"
          fi
