name: Update Google Trends Data
on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:

  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper with progress commit on kill
        env:
          BRIGHTDATA_USERNAME: ${{ secrets.BRIGHTDATA_USERNAME }}
          BRIGHTDATA_PASSWORD: ${{ secrets.BRIGHTDATA_PASSWORD }}
          BRIGHTDATA_HOST:     ${{ secrets.BRIGHTDATA_HOST }}
          BRIGHTDATA_PORT:     ${{ secrets.BRIGHTDATA_PORT }}
        run: |
          cleanup() {
            echo "⚠️ Signal received — committing progress before exit..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/scraping_progress.json data/Demand_Excel_With_Trends.xlsx data/dashboard_trends_data.json || true
            git diff --staged --quiet || git commit -m "Partial progress $(date +'%Y-%m-%d %H:%M:%S')"
            git push || true
            echo "✅ Progress committed"
          }
          trap cleanup EXIT SIGTERM SIGINT

          # Kill the scraper after 5h 45m — gives 15 min buffer before
          # GitHub's hard 6h kill, enough time for git push to complete
          timeout 20700 python google_trends_scraper.py || true

  retrigger:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest commit
        # The scrape job's trap may have pushed a new commit just before
        # dying — we must pull it here or we're reading stale progress.json
        run: git pull origin main

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Check remaining and re-trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, sys
          from pathlib import Path
          import pandas as pd

          progress_file = Path("data/scraping_progress.json")
          excel_file    = Path("data/Demand_Excel_With_Trends.xlsx")

          if not progress_file.exists() or not excel_file.exists():
              print("No progress file found — assuming first run or incomplete")
              open("RETRIGGER", "w").close()
              sys.exit(0)

          with open(progress_file) as f:
              progress = json.load(f)

          df        = pd.read_excel(excel_file)
          total     = len(df)
          scraped   = len(progress.get("scraped_indices", []))
          remaining = total - scraped

          # Only count products that have failed 5 times or fewer
          # Products failing more than 5 times are likely permanently
          # unavailable on Google Trends and should not block the chain
          actionable_failures = {
              k: v for k, v in progress.get("failed_attempts", {}).items()
              if v <= 5
          }
          failed = len(actionable_failures)

          print(f"Total:     {total}")
          print(f"Scraped:   {scraped}")
          print(f"Remaining: {remaining}")
          print(f"Failed:    {failed} (capped at 5 attempts each)")

          if remaining > 0 or failed > 0:
              print("⏳ Work remains — will re-trigger after 20 min")
              open("RETRIGGER", "w").close()
          else:
              print("✅ All products scraped — stopping chain")
          EOF

          if [ -f RETRIGGER ]; then
            echo "⏳ Waiting 20 minutes before next run..."
            sleep 1200
            echo "🔁 Triggering next run..."
            gh workflow run update_trends.yml
          else
            echo "🎉 All done! No further runs needed."
          fi
