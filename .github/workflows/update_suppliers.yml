name: Update Suppliers

on:
  schedule:
    # Quarterly: 1st of Jan, Apr, Jul, Oct at 00:30 UTC (06:00 IST).
    # Staggered from update_products.yml (08:00 UTC) to prevent simultaneous
    # pushes to main.
    - cron: '30 0 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      reset:
        description: 'Start fresh (ignore checkpoint)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  fetch-suppliers:
    name: Fetch MSME Suppliers
    runs-on: ubuntu-latest
    # 6 hours is the GitHub Actions hard ceiling.
    # At 4.5s/request and ~7,249 total pages the full run takes ~9 hrs.
    # The retrigger job below handles continuation across multiple runs.
    timeout-minutes: 360

    outputs:
      # Defaults to 'true' — only set to 'false' on a clean complete run.
      # This means a timeout (which kills the step before it can write any
      # output) is correctly treated as incomplete and triggers a continuation.
      run_incomplete: ${{ steps.mark_complete.outputs.incomplete || 'true' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-suppliers-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-suppliers-

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      # ── Fetch + commit in one shell ────────────────────────────────────────
      # The trap and the fetcher MUST live in the same shell process.
      # Each workflow `run:` block is a separate shell — a trap registered in
      # one step does not carry over to the next step.
      #
      # Putting everything in one `run:` block means:
      #   • trap '...' TERM  — fires on SIGTERM (GitHub timeout / UI cancel)
      #   • trap '...' EXIT  — fires on any shell exit (errors, etc.)
      # Both are guaranteed to run in the same process that ran the fetcher,
      # so the commit always happens regardless of how the job ends.
      #
      # SIGKILL (kill -9) still cannot be trapped — nothing can — but GitHub
      # Actions sends SIGTERM first and waits ~30s before escalating, which
      # is more than enough time to commit and push.
      # ──────────────────────────────────────────────────────────────────────
      - name: Run MSME supplier fetcher
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        run: |
          # ── Commit function ──────────────────────────────────────────────
          commit_and_push() {
            echo "--- commit_and_push triggered (${1:-unknown}) ---"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git pull --rebase origin main || true
            git add data/suppliers/
            if git diff --cached --quiet; then
              echo "Nothing new to commit."
            else
              LABEL=$([ "$1" = "partial" ] && echo "partial" || echo "refresh")
              git commit -m "chore(data): ${LABEL} supplier data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
              git push
              echo "Committed and pushed supplier data."
            fi
          }

          # ── Trap — fires on SIGTERM (timeout/cancel) and EXIT ────────────
          trap 'commit_and_push partial' TERM
          trap 'commit_and_push partial' EXIT

          # ── Run fetcher ──────────────────────────────────────────────────
          RESET_FLAG=""
          if [ "${{ github.event.inputs.reset }}" = "true" ]; then
            RESET_FLAG="--reset"
            echo "Reset flag set — ignoring any existing checkpoint."
          fi

          python msme_supplier_fetcher.py $RESET_FLAG
          FETCH_EXIT=$?

          # Disarm the EXIT trap — commit explicitly below so the message
          # reflects the actual outcome (partial vs refresh).
          trap - EXIT

          if [ $FETCH_EXIT -eq 2 ]; then
            echo "Run ended with pending states — committing progress."
            commit_and_push partial
          elif [ $FETCH_EXIT -eq 0 ]; then
            echo "All states completed — committing."
            commit_and_push refresh
          else
            echo "::error::Fetcher exited with code $FETCH_EXIT — check logs above."
            commit_and_push partial
            exit $FETCH_EXIT
          fi

      # ── Mark complete — only runs if fetcher finished cleanly ─────────────
      # This step is intentionally separate. If the job times out, this step
      # is skipped, so mark_complete.outputs.incomplete is never set.
      # The job-level output expression falls back to 'true', which correctly
      # triggers the retrigger job. Only a clean exit (fetcher returns 0)
      # reaches this step and writes 'false' to stop the retrigger chain.
      # ──────────────────────────────────────────────────────────────────────
      - name: Mark run complete
        id: mark_complete
        run: echo "incomplete=false" >> "$GITHUB_OUTPUT"

      - name: Verify output files were produced
        run: |
          count=$(find data/suppliers -name "suppliers_*.csv" 2>/dev/null | wc -l)
          echo "Supplier CSV files present: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::No supplier files found after run — check API key and script logs."
            exit 1
          fi

  # ── Retrigger job ──────────────────────────────────────────────────────────
  # Fires whenever fetch-suppliers did not complete all states — including on
  # timeout, where the step never gets to write any output at all.
  retrigger-if-incomplete:
    name: Retrigger if run was incomplete
    needs: fetch-suppliers
    runs-on: ubuntu-latest
    if: needs.fetch-suppliers.outputs.run_incomplete == 'true'

    steps:
      - name: Trigger another fetch run via workflow_dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Run was incomplete — triggering a continuation run."
          sleep 30
          gh workflow run update_suppliers.yml \
            --repo "${{ github.repository }}" \
            --ref  "${{ github.ref_name }}"
          echo "Continuation run triggered successfully."
