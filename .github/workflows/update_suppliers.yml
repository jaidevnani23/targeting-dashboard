name: Update Suppliers

on:
  schedule:
    # Quarterly: 1st of Jan, Apr, Jul, Oct at 00:30 UTC (06:00 IST).
    # Staggered from update_products.yml (08:00 UTC) to prevent simultaneous
    # pushes to main.
    - cron: '30 0 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      reset:
        description: 'Start fresh (ignore checkpoint)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  fetch-suppliers:
    name: Fetch MSME Suppliers
    runs-on: ubuntu-latest
    # Hard ceiling — safety net only. The script stops itself at 5h 45m
    # (RUN_DEADLINE_SECONDS=20700), leaving 15 min for commit + retrigger.
    timeout-minutes: 360

    outputs:
      # Set explicitly by the fetcher step to either 'true' or 'false'.
      # Defaults to 'true' if the step never ran (e.g. job-level timeout
      # killed the runner before the step could write output).
      run_incomplete: ${{ steps.run_fetcher.outputs.incomplete || 'true' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-suppliers-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-suppliers-

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      # ── Fetcher step ───────────────────────────────────────────────────────
      # The script manages its own 5h 45m deadline and exits 2 when time is up,
      # with every page already checkpointed to disk. This step normalises both
      # exit codes (0 and 2) to a shell exit 0 so subsequent steps always run,
      # and writes 'incomplete' to GITHUB_OUTPUT so the retrigger job knows
      # whether to fire.
      #
      # Exit code meanings (from the script):
      #   0  — all states finished cleanly
      #   2  — deadline reached or states still pending; checkpoint is current
      #   other — unexpected error; step fails, subsequent steps are skipped
      # ──────────────────────────────────────────────────────────────────────
      - name: Run MSME supplier fetcher
        id: run_fetcher
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          RUN_DEADLINE_SECONDS: "20700"   # 5h 45m
        run: |
          RESET_FLAG=""
          if [ "${{ github.event.inputs.reset }}" = "true" ]; then
            RESET_FLAG="--reset"
            echo "Reset flag set — ignoring any existing checkpoint."
          fi

          python msme_supplier_fetcher.py $RESET_FLAG
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "All states completed successfully."
            echo "incomplete=false" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "Deadline reached — progress saved, continuation run will follow."
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            # Do NOT exit non-zero — the commit step must still run.
          else
            echo "::error::Fetcher exited with unexpected code $EXIT_CODE."
            echo "incomplete=true" >> "$GITHUB_OUTPUT"
            exit $EXIT_CODE   # fail the step; commit is skipped on unexpected errors
          fi

      # Runs after both exit 0 and exit 2 because the fetcher step above
      # always exits 0 in those cases.
      - name: Commit and push supplier data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/suppliers/
          if git diff --cached --quiet; then
            echo "No changes to commit — data already up to date."
          else
            git commit -m "chore(data): partial supplier data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Committed and pushed supplier data."
          fi

      - name: Verify output files were produced
        run: |
          count=$(find data/suppliers -name "suppliers_*.csv" 2>/dev/null | wc -l)
          echo "Supplier CSV files present: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::No supplier files found — check API key and script logs."
            exit 1
          fi

  # ── Retrigger job ──────────────────────────────────────────────────────────
  # Fires when run_incomplete == 'true'.
  # always() is required — without it GitHub skips dependent jobs when the
  # parent is cancelled or timed out, regardless of the if: condition.
  # ──────────────────────────────────────────────────────────────────────────
  retrigger-if-incomplete:
    name: Retrigger if run was incomplete
    needs: fetch-suppliers
    runs-on: ubuntu-latest
    if: always() && needs.fetch-suppliers.outputs.run_incomplete == 'true'

    steps:
      - name: Wait 20 minutes then trigger continuation run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Run was incomplete — waiting 20 minutes before retriggering."
          sleep 1200
          gh workflow run update_suppliers.yml \
            --repo "${{ github.repository }}" \
            --ref  "${{ github.ref_name }}"
          echo "Continuation run triggered successfully."
